# =============================================================================
# Continuous Integration
#
# Triggers:
#   - Pull request (qualsiasi branch)
#   - Push diretto su main
#
# Strategia:
#   1. detect-changes: filtra i path modificati per saltare job inutili
#   2. Backend (Rails 8): lint (rubocop), security (brakeman + bundler-audit), test (minitest)
#   3. Frontend (Angular 21): lint (eslint), test (vitest)
#   4. docker-build: builda entrambe le immagini come sanity check (NON pubblica)
# =============================================================================

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancella esecuzioni precedenti dello stesso branch/PR per non sprecare runner.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Path filter: stabilisce quali parti del repo sono cambiate
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'

  # ---------------------------------------------------------------------------
  # Backend: lint (rubocop)
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend lint (Rubocop)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Run Rubocop
        run: bin/rubocop -f github

  # ---------------------------------------------------------------------------
  # Backend: security scans (Brakeman SAST + bundler-audit CVE)
  # ---------------------------------------------------------------------------
  backend-security:
    name: Backend security (Brakeman + bundler-audit)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Brakeman (Rails static analysis)
        run: bin/brakeman --no-pager

      - name: Bundler-audit (vulnerable gems)
        run: bin/bundler-audit

  # ---------------------------------------------------------------------------
  # Backend: test (Minitest)
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend test (Minitest)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Prepare test database
        run: bin/rails db:test:prepare

      - name: Run Minitest
        run: bin/rails test

  # ---------------------------------------------------------------------------
  # Frontend: lint (ESLint via ng lint)
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Frontend lint (ESLint)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npx ng lint

  # ---------------------------------------------------------------------------
  # Frontend: test (Vitest via ng test)
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend test (Vitest)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Vitest
        run: npx ng test --watch=false

  # ---------------------------------------------------------------------------
  # Docker build (Continuous Delivery — costruisce ma NON pubblica)
  # Verifica che entrambe le immagini si compilino con successo.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker images build check
    needs: [changes, backend-test, frontend-test]
    # Gira anche se i cambiamenti sono solo Docker; salta se un test ha fallito.
    if: |
      always()
      && !cancelled()
      && !contains(needs.*.result, 'failure')
      && (needs.changes.outputs.docker == 'true'
          || needs.changes.outputs.backend == 'true'
          || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: shop-backend:ci-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: shop-frontend:ci-${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ---------------------------------------------------------------------------
  # Gate finale: aggregato per branch protection rules
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI success
    needs:
      - backend-lint
      - backend-security
      - backend-test
      - frontend-lint
      - frontend-test
      - docker-build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        run: |
          if echo '${{ toJSON(needs) }}' | grep -q '"result": "failure"'; then
            echo "Almeno un job richiesto è fallito."
            exit 1
          fi
          echo "Tutti i job richiesti sono passati."
