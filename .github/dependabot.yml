version: 2
updates:
  # Backend Rails (Gemfile)
  - package-ecosystem: bundler
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Frontend Angular (package.json)
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions in the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Dockerfile dipendenze base images
  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/frontend"
    schedule:
      interval: weekly
